<nav class="flex relative justify-between items-center bg-white px-6 md:px-20 py-4 shadow-md shadow-gray-200">
    <!-- Logo -->
    <div>
        <h1 class="text-2xl font-bold text-[#FF69B4]">{{titre}}</h1>
    </div>

    <!-- Bouton Hamburger (Visible seulement sur mobile) -->
    <button (click)="isOpen = !isOpen" class="md:hidden text-violet-500 focus:outline-none">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
    </button>

    <!-- Liste des liens -->
    <!-- Sur mobile: position absolue, plein écran. Sur desktop: position statique -->
    <div [class.hidden]="!isOpen" class="absolute top-full left-0 w-full bg-white md:static md:w-auto md:block shadow-lg md:shadow-none">
        <ul class="flex flex-col md:flex-row items-center gap-2 p-4 md:p-0">
            @for (item of liste; track item) {
                <li>
                    <a class="block px-4 py-2 text-xl font-medium text-violet-500 transition-colors duration-200 hover:text-violet-800 hover:underline" href="#">
                        {{item}}
                    </a>
                </li>
            } @empty {
                <li class="text-gray-400 italic">Aucun élément</li>
            }
        </ul>
    </div>
</nav>
